<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img"
     aria-label="A line chart: p95 latency in cobalt stays under a dashed 300ms threshold as load climbs from 0 to 1,000 requests per second.">
  <title>Distributed Systems Profiler — sub-300ms p95 held to 1,000 RPS</title>
  <rect width="640" height="400" fill="#FAFAF9"/>

  <!-- axes -->
  <g stroke="#8A8A90" stroke-width="1">
    <line x1="70" y1="40" x2="70" y2="340"/>
    <line x1="70" y1="340" x2="600" y2="340"/>
  </g>

  <!-- y ticks / labels (0 → 400ms) -->
  <g font-family="'IBM Plex Mono', monospace" font-size="12" fill="#8A8A90" text-anchor="end">
    <text x="60" y="344">0</text>
    <text x="60" y="194">200ms</text>
    <text x="60" y="44">400ms</text>
  </g>

  <!-- 300ms threshold (dashed, muted) -->
  <line x1="70" y1="115" x2="600" y2="115" stroke="#8A8A90" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="600" y="108" font-family="'IBM Plex Mono', monospace" font-size="12"
        fill="#8A8A90" text-anchor="end">300ms threshold</text>

  <!-- p95 latency curve (cobalt) — climbs with load but holds under threshold -->
  <polyline fill="none" stroke="#1E3AFF" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"
            points="70,250 160,244 250,234 340,221 430,205 520,186 600,165"/>
  <circle cx="600" cy="165" r="3.5" fill="#1E3AFF"/>
  <text x="588" y="156" font-family="'IBM Plex Mono', monospace" font-size="13"
        fill="#1E3AFF" text-anchor="end">p95</text>

  <!-- x ticks / labels (RPS) -->
  <g font-family="'IBM Plex Mono', monospace" font-size="12" fill="#8A8A90" text-anchor="middle">
    <text x="70" y="360">0</text>
    <text x="335" y="360">500</text>
    <text x="600" y="360">1,000</text>
    <text x="335" y="384" fill="#0E0E10">requests / sec</text>
  </g>
</svg>
