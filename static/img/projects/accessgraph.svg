<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img"
     aria-label="A directed IAM graph with one multi-hop privilege-escalation path highlighted: user to roleA to roleB to admin.">
  <title>AccessGraph — escalation path through the IAM graph</title>
  <rect width="640" height="400" fill="#FAFAF9"/>

  <defs>
    <marker id="ag-arrow-muted" viewBox="0 0 10 10" refX="8.5" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#8A8A90"/>
    </marker>
    <marker id="ag-arrow-accent" viewBox="0 0 10 10" refX="8.5" refY="5"
            markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#1E3AFF"/>
    </marker>
  </defs>

  <!-- legend -->
  <line x1="44" y1="40" x2="74" y2="40" stroke="#1E3AFF" stroke-width="2.5"/>
  <text x="82" y="44" font-family="'IBM Plex Mono', monospace" font-size="13" fill="#1E3AFF">escalation path</text>

  <!-- decoy (muted) edges -->
  <g fill="none" stroke="#8A8A90" stroke-width="1.5">
    <line x1="120" y1="223" x2="228" y2="296" marker-end="url(#ag-arrow-muted)"/>
    <line x1="276" y1="310" x2="382" y2="310" marker-end="url(#ag-arrow-muted)"/>
    <line x1="433" y1="293" x2="524" y2="226" marker-end="url(#ag-arrow-muted)"/>
    <line x1="265" y1="129" x2="394" y2="290" marker-end="url(#ag-arrow-muted)"/>
  </g>

  <!-- highlighted escalation path -->
  <g fill="none" stroke="#1E3AFF" stroke-width="2.5">
    <line x1="120" y1="197" x2="228" y2="124" marker-end="url(#ag-arrow-accent)"/>
    <line x1="276" y1="110" x2="382" y2="110" marker-end="url(#ag-arrow-accent)"/>
    <line x1="433" y1="127" x2="524" y2="195" marker-end="url(#ag-arrow-accent)"/>
  </g>

  <!-- decoy nodes -->
  <g font-family="'IBM Plex Mono', monospace" font-size="13" text-anchor="middle">
    <circle cx="250" cy="310" r="22" fill="#FFFFFF" stroke="#8A8A90" stroke-width="1.5"/>
    <circle cx="410" cy="310" r="22" fill="#FFFFFF" stroke="#8A8A90" stroke-width="1.5"/>
    <text x="250" y="356" fill="#8A8A90">roleX</text>
    <text x="410" y="356" fill="#8A8A90">roleY</text>
  </g>

  <!-- path nodes -->
  <g font-family="'IBM Plex Mono', monospace" font-size="13" text-anchor="middle">
    <circle cx="100" cy="210" r="22" fill="#E7ECFF" stroke="#1E3AFF" stroke-width="2.5"/>
    <circle cx="250" cy="110" r="22" fill="#E7ECFF" stroke="#1E3AFF" stroke-width="2.5"/>
    <circle cx="410" cy="110" r="22" fill="#E7ECFF" stroke="#1E3AFF" stroke-width="2.5"/>
    <circle cx="545" cy="210" r="22" fill="#E7ECFF" stroke="#1E3AFF" stroke-width="2.5"/>
    <text x="100" y="252" fill="#0E0E10">user</text>
    <text x="250" y="74" fill="#0E0E10">roleA</text>
    <text x="410" y="74" fill="#0E0E10">roleB</text>
    <text x="545" y="252" fill="#0E0E10">admin</text>
  </g>
</svg>
